apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.crashlytics'

ext {
    hermesEnabled = true
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "nz.co.pieme.apps.ipc"

    defaultConfig {
        applicationId "nz.co.pieme.apps.ipc"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('APPCENTER_KEYSTORE_FILE')) {
                storeFile rootProject.file(APPCENTER_KEYSTORE_FILE)
                storePassword APPCENTER_KEYSTORE_PASSWORD
                keyAlias APPCENTER_KEY_ALIAS
                keyPassword APPCENTER_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

react {
    autolinkLibrariesWithApp()
}

dependencies {
    // React Native (version managed by React Native Gradle Plugin)
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // Google Mobile Ads (needed for MobileAds.initialize in MainActivity)
    implementation 'com.google.android.gms:play-services-ads:23.1.0'
}
